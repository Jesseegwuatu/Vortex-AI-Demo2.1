<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vortex AI | Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 1rem;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #1a1a2e, #0a0a0f);
      z-index: -2;
      top: 0;
      left: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: float 25s infinite alternate;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      100% { transform: translate(5%, 5%) scale(1.3); opacity: 0.15; }
    }
    .orb1 { width: 60vw; height: 60vw; background: #3b82f6; top: -20%; left: -20%; }
    .orb2 { width: 50vw; height: 50vw; background: #8b5cf6; bottom: -30%; right: -20%; animation-duration: 35s; }
    .orb3 { width: 40vw; height: 40vw; background: #06b6d4; top: 40%; left: 50%; animation-duration: 20s; }

    /* Glass Card */
    .glass-card {
      background: rgba(15, 25, 45, 0.6);
      backdrop-filter: blur(15px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 212, 255, 0.25);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      animation: fadeInUp 0.6s ease;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #00ffff, #3b82f6);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 255, 255, 0.8); }
    }
    .logo-icon i { font-size: 2.2rem; color: white; }
    .logo h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #fff, #00ffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .logo p {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }

    /* Form Group */
    .form-group {
      margin-bottom: 1.2rem;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrapper i {
      position: absolute;
      left: 1rem;
      color: #64748b;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .input-wrapper input {
      width: 100%;
      background: rgba(20, 30, 45, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 1rem;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      color: white;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      outline: none;
    }
    .input-wrapper input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
      background: rgba(20, 30, 45, 0.95);
    }
    .input-wrapper input::placeholder {
      color: #475569;
    }

    /* Name Row (First + Last) */
    .name-row {
      display: flex;
      gap: 1rem;
    }
    .name-row .form-group {
      flex: 1;
    }

    /* Button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #00ffff, #3b82f6);
      border: none;
      border-radius: 1rem;
      padding: 0.9rem;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 255, 255, 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    /* Google Button */
    .btn-google {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1rem;
      padding: 0.9rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.5);
    }
    .btn-google i {
      font-size: 1.1rem;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: #475569;
      font-size: 0.8rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
    }
    .divider span {
      margin: 0 1rem;
    }

    /* Login Link */
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #94a3b8;
      font-size: 0.85rem;
    }
    .login-link a {
      color: #00ffff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .login-link a:hover {
      text-shadow: 0 0 8px #00ffff;
    }

    /* Error/Success Messages */
    .message {
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }
    .message.success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    /* Loading state */
    .btn-primary:disabled, .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 500px) {
      .glass-card {
        padding: 1.8rem;
      }
      .name-row {
        flex-direction: column;
        gap: 0;
      }
      .logo-icon {
        width: 55px;
        height: 55px;
      }
      .logo-icon i {
        font-size: 1.8rem;
      }
      .logo h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="glass-card">
  <div class="logo">
    <div class="logo-icon">
      <i class="fas fa-vortex"></i>
    </div>
    <h1>Create Account</h1>
    <p>Join the future of intelligence</p>
  </div>

  <div id="message" class="message"></div>

  <form id="registerForm">
    <div class="name-row">
      <div class="form-group">
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="firstName" placeholder="First Name" required>
        </div>
      </div>
      <div class="form-group">
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="lastName" placeholder="Last Name" required>
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="Email Address" required>
      </div>
    </div>

    <div class="form-group">
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Password (min 6 characters)" required>
      </div>
    </div>

    <button type="submit" class="btn-primary" id="signUpBtn">
      <i class="fas fa-arrow-right"></i> Sign Up
    </button>
  </form>

  <div class="divider">
    <span>OR</span>
  </div>

  <button class="btn-google" id="googleSignUpBtn">
    <i class="fab fa-google"></i> Continue with Google
  </button>

  <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
  // ==================== FIREBASE CONFIGURATION ====================
  const firebaseConfig = {
    apiKey: "AIzaSyBD21w845BJM_RMz90s-3Hxj80nrhMxly4",
    authDomain: "vortex-ai-56177.firebaseapp.com",
    projectId: "vortex-ai-56177",
    storageBucket: "vortex-ai-56177.firebasestorage.app",
    messagingSenderId: "746045419077",
    appId: "1:746045419077:web:250d5360ee6f493d77bd2c",
    measurementId: "G-7E814PXDZZ",
    databaseURL: "https://vortex-ai-56177-default-rtdb.firebaseio.com/"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  // DOM Elements
  const registerForm = document.getElementById('registerForm');
  const signUpBtn = document.getElementById('signUpBtn');
  const googleSignUpBtn = document.getElementById('googleSignUpBtn');
  const messageDiv = document.getElementById('message');

  // Helper function to show messages
  function showMessage(text, isError = true) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${isError ? 'error' : 'success'}`;
    messageDiv.style.display = 'block';
    
    setTimeout(() => {
      messageDiv.style.display = 'none';
    }, 5000);
  }

  // Helper function to save user data to Realtime Database
  async function saveUserToDatabase(userId, firstName, lastName, email) {
    try {
      await database.ref(`users/${userId}`).set({
        firstName: firstName,
        lastName: lastName,
        email: email,
        createdAt: new Date().toISOString(),
        lastLoginAt: new Date().toISOString(),
        subscriptionTier: 'free'
      });
      return true;
    } catch (error) {
      console.error("Database save error:", error);
      return false;
    }
  }

  // Helper function to redirect to chat page
  function redirectToChat() {
    window.location.href = 'vortexai.html';
  }

  // Email/Password Sign Up
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    // Validation
    if (!firstName || !lastName || !email || !password) {
      showMessage('Please fill in all fields', true);
      return;
    }
    
    if (password.length < 6) {
      showMessage('Password must be at least 6 characters', true);
      return;
    }
    
    // Disable button and show loading
    signUpBtn.disabled = true;
    signUpBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating Account...';
    
    try {
      // Create user with email/password
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;
      
      // Save additional user data to Realtime Database
      const saved = await saveUserToDatabase(user.uid, firstName, lastName, email);
      
      if (saved) {
        showMessage('Account created successfully! Redirecting...', false);
        setTimeout(() => {
          redirectToChat();
        }, 1500);
      } else {
        showMessage('Account created but profile data could not be saved. Please contact support.', true);
      }
      
    } catch (error) {
      console.error("Sign up error:", error);
      
      let errorMessage = 'Sign up failed. ';
      switch (error.code) {
        case 'auth/email-already-in-use':
          errorMessage = 'Email already in use. Please login instead.';
          break;
        case 'auth/invalid-email':
          errorMessage = 'Invalid email address.';
          break;
        case 'auth/weak-password':
          errorMessage = 'Password is too weak. Use at least 6 characters.';
          break;
        default:
          errorMessage += error.message;
      }
      showMessage(errorMessage, true);
    } finally {
      signUpBtn.disabled = false;
      signUpBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Sign Up';
    }
  });

  // Google Sign Up
  googleSignUpBtn.addEventListener('click', async () => {
    googleSignUpBtn.disabled = true;
    googleSignUpBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Connecting to Google...';
    
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('profile');
    provider.addScope('email');
    
    try {
      const result = await auth.signInWithPopup(provider);
      const user = result.user;
      const firstName = user.displayName?.split(' ')[0] || '';
      const lastName = user.displayName?.split(' ').slice(1).join(' ') || '';
      const email = user.email;
      
      // Check if user already exists in database
      const userSnapshot = await database.ref(`users/${user.uid}`).once('value');
      
      if (!userSnapshot.exists()) {
        // New user - save to database
        await saveUserToDatabase(user.uid, firstName, lastName, email);
        showMessage('Account created successfully! Redirecting...', false);
      } else {
        showMessage('Welcome back! Redirecting...', false);
      }
      
      setTimeout(() => {
        redirectToChat();
      }, 1500);
      
    } catch (error) {
      console.error("Google sign in error:", error);
      let errorMessage = 'Google sign in failed. ';
      if (error.code === 'auth/popup-blocked') {
        errorMessage = 'Popup was blocked. Please allow popups for this site.';
      } else if (error.code === 'auth/cancelled-popup-request') {
        errorMessage = 'Sign in was cancelled. Please try again.';
      } else {
        errorMessage += error.message;
      }
      showMessage(errorMessage, true);
    } finally {
      googleSignUpBtn.disabled = false;
      googleSignUpBtn.innerHTML = '<i class="fab fa-google"></i> Continue with Google';
    }
  });

  // Check if user is already logged in
  auth.onAuthStateChanged((user) => {
    if (user) {
      // User is already logged in, redirect to chat
      window.location.href = 'vortexai.html';
    }
  });
</script>
</body>
</html>
